name: CI — Build, Test, & Deploy

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  # Test database credentials (CI runners only)
  DATABASE_URL: postgresql://test:test@localhost:5432/vibechat_test
  MONGODB_URI: mongodb://localhost:27017/vibechat_test
  REDIS_URL: redis://localhost:6379
  JWT_SECRET: test-secret-sprint0-ci
  REFRESH_TOKEN_SECRET: test-refresh-secret-ci
  AWS_ACCESS_KEY_ID: test-key-ci
  AWS_SECRET_ACCESS_KEY: test-secret-ci
  S3_BUCKET: vibechat-test-ci
  RESEND_API_KEY: test-resend-key
  SENTRY_DSN: https://test@test.ingest.sentry.io/123
  NODE_ENV: test

jobs:
  # ─────────────────────────────────────────────────────────────────────
  # Lint & Type Check
  # ─────────────────────────────────────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20.11.0
        uses: actions/setup-node@v4
        with:
          node-version: "20.11.0"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint --workspaces --if-present

      - name: Type check (TypeScript)
        run: npm run type-check --workspaces --if-present

  # ─────────────────────────────────────────────────────────────────────
  # Build & Test (Backend + Frontend)
  # ─────────────────────────────────────────────────────────────────────
  build-test:
    name: Build & Test
    runs-on: ubuntu-latest

    services:
      # PostgreSQL for Prisma
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: vibechat_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      # MongoDB for Mongoose
      mongo:
        image: mongo:7
        options: >-
          --health-cmd mongosh
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 27017:27017

      # Redis for ioredis
      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20.11.0
        uses: actions/setup-node@v4
        with:
          node-version: "20.11.0"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run Prisma migrations (test database)
        run: npx prisma migrate deploy
        working-directory: apps/server

      - name: Build projects
        run: npm run build

      - name: Run tests
        run: npm run test -- --coverage --runInBand
        timeout-minutes: 10

      - name: Upload coverage to Codecov (optional)
        uses: codecov/codecov-action@v3
        if: always()
        with:
          files: ./coverage/coverage-final.json
          fail_ci_if_error: false

  # ─────────────────────────────────────────────────────────────────────
  # Health Check — Verify all databases connect
  # ─────────────────────────────────────────────────────────────────────
  health-check:
    name: Database Health Check
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: vibechat_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      mongo:
        image: mongo:7
        options: >-
          --health-cmd mongosh
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 27017:27017

      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20.11.0
        uses: actions/setup-node@v4
        with:
          node-version: "20.11.0"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run Prisma migrations
        run: npx prisma migrate deploy
        working-directory: apps/server

      - name: Build server
        run: npm run build
        working-directory: apps/server

      - name: Start server and test /health
        run: |
          npm run build
          timeout 30 npm run start &
          sleep 5
          curl -f http://localhost:4000/health || exit 1
        working-directory: apps/server

  # ─────────────────────────────────────────────────────────────────────
  # Success gate: All checks must pass before merging
  # ─────────────────────────────────────────────────────────────────────
  all-checks-pass:
    name: ✓ All Checks Pass
    runs-on: ubuntu-latest
    needs: [lint, build-test, health-check]
    if: always()

    steps:
      - name: Decide whether checks passed
        run: |
          if [[ "${{ needs.lint.result }}" == "failure" || \
                "${{ needs.build-test.result }}" == "failure" || \
                "${{ needs.health-check.result }}" == "failure" ]]; then
            echo "❌ One or more checks failed"
            exit 1
          fi
          echo "✓ All checks passed"
